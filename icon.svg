<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   xmlns:dc="http://purl.org/dc/elements/1.1/"
   xmlns:cc="http://creativecommons.org/ns#"
   xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#"
   xmlns:svg="http://www.w3.org/2000/svg"
   xmlns="http://www.w3.org/2000/svg"
   width="256"
   height="256"
   viewBox="0 0 256 256"
   version="1.1"
   id="svg_touchpad_control">
  <defs
     id="defs_touchpad_control" />
  <metadata
     id="metadata_touchpad_control">
    <rdf:RDF>
      <cc:Work
         rdf:about="">
        <dc:format>image/svg+xml</dc:format>
        <dc:type
           rdf:resource="http://purl.org/dc/dcmitype/StillImage" />
        <dc:title>Touchpad Speed Control Icon</dc:title>
      </cc:Work>
    </rdf:RDF>
  </metadata>
  <g
     id="g_icon_elements"
     style="fill:#00aad4;fill-opacity:1;stroke:none"
     transform="translate(16,16)">
    <!-- Central Touchpad -->
    <rect
       style="fill:#00aad4;fill-opacity:1;stroke:none;stroke-width:0;stroke-linecap:round;stroke-linejoin:round"
       id="rect_touchpad_main"
       width="112"
       height="144"
       x="56"
       y="40"
       rx="16"
       ry="16" />
    <rect
       style="fill:#00aad4;fill-opacity:1;stroke:none;stroke-width:0;stroke-linecap:round;stroke-linejoin:round;opacity:0.3"
       id="rect_touchpad_bottom"
       width="112"
       height="32"
       x="56"
       y="152"
       rx="0"
       ry="0" />
    <path
       d="M 168,152 A 16,16 0 0 1 152,168 L 72,168 A 16,16 0 0 1 56,152 L 168,152 z"
       style="fill:#00aad4;fill-opacity:1;stroke:none"
       id="path_touchpad_bottom_curve" />
    
    <!-- Horizontal Speed Indicator -->
    <path
       d="M 56,32 L 32,32 A 4,4 0 0 1 28,28 L 28,12 A 4,4 0 0 1 32,8 L 56,8 A 4,4 0 0 1 60,12 L 60,28 A 4,4 0 0 1 56,32 z m -16,-16 l 0,8 m 8,-8 l 0,8"
       style="fill:#00aad4;fill-opacity:1;stroke:none"
       id="path_horizontal_indicators"
       transform="translate(0, 0)"/>
    <path
       d="M 28,20 L 4,20 M 4,20 L 12,12 M 4,20 L 12,28 M 224,20 L 200,20 M 224,20 L 216,12 M 224,20 L 216,28"
       style="fill:none;stroke:#00aad4;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;stroke-opacity:1"
       id="path_horizontal_arrows"
       transform="translate(16, 0)" />

    <!-- Vertical Speed Indicator -->
    <path
       d="M 200,80 L 224,80 A 4,4 0 0 1 228,84 L 228,100 A 4,4 0 0 1 224,104 L 200,104 A 4,4 0 0 1 196,100 L 196,84 A 4,4 0 0 1 200,80 z m 16,16 l -8,0 m 8,-8 l -8,0"
       style="fill:#00aad4;fill-opacity:1;stroke:none"
       id="path_vertical_indicators"
       transform="translate(0, 0)" />
    <path
       d="M 212,104 L 212,224 M 212,224 L 204,216 M 212,224 L 220,216 M 212,20 L 212,4 M 212,4 L 204,12 M 212,4 L 220,12"
       style="fill:none;stroke:#00aad4;stroke-width:8;stroke-linecap:round;stroke-linejoin:round;stroke-opacity:1"
       id="path_vertical_arrows"
       transform="translate(16, 16)" />
  </g>
</svg>
